<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Rooms</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<div id="authView" class="view">
  <div class="card">
    <h1>Chat Rooms</h1>

    <div id="loginForm">
      <h2>Log in</h2>
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">
      <button onclick="login()">Log in</button>
      <p class="switchLink">No account? <a onclick="showRegister()">Register</a></p>
    </div>

    <div id="registerForm" class="hidden">
      <h2>Register</h2>
      <input id="registerEmail" type="email" placeholder="Email">
      <input id="registerPassword" type="password" placeholder="Password (8-20 chars)">
      <input id="registerDisplayName" type="text" placeholder="Display name">
      <button onclick="register()">Register</button>
      <p class="switchLink">Have an account? <a onclick="showLogin()">Log in</a></p>
    </div>

    <p id="authError" class="error hidden"></p>
  </div>
</div>

<div id="roomsView" class="view hidden">
  <div class="topbar">
    <span id="whoami"></span>
    <button class="secondary" onclick="logout()">Log out</button>
  </div>

  <div class="card">
    <h2>Create a room</h2>
    <input id="newRoomName" type="text" placeholder="Room name">
    <input id="newRoomDescription" type="text" placeholder="Description">
    <label class="checkboxLabel">
      <input id="newRoomPrivate" type="checkbox"> Private
    </label>
    <button onclick="createRoom()">Create</button>
  </div>

  <div class="card">
    <h2>Join a room by ID</h2>
    <input id="joinRoomId" type="number" placeholder="Room ID">
    <button onclick="joinRoomById()">Join</button>
  </div>

  <div class="card">
    <h2>Rooms</h2>
    <button class="secondary" onclick="loadRooms()">Refresh list</button>
    <div id="roomList"></div>
  </div>

  <p id="roomsError" class="error hidden"></p>
</div>

<div id="chatView" class="view hidden">
  <div class="topbar">
    <button class="secondary" onclick="leaveChatView()">Back to rooms</button>
    <span id="chatRoomTitle"></span>
    <span id="wsStatus" class="status disconnected">disconnected</span>
  </div>

  <div id="messageList"></div>

  <div class="messageInputRow">
    <input id="messageInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
